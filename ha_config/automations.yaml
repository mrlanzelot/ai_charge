# Smart EV Charging – Home Assistant Automations
# These are created automatically by deploy.py.
# For manual import: Developer Tools → Template / YAML import.

- alias: "EV – Enable smart charging at night"
  description: >
    Enables smart charging at the configured start time if the car is connected.
    The pyscript controller takes over from this point.
  triggers:
    - trigger: time
      at: input_datetime.ev_charge_start_time
  conditions:
    - condition: state
      entity_id: sensor.gpn007772_charger_mode
      state:
        - connected_charging
        - connected_requesting
  actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ev_smart_charging_enabled
    - action: logbook.log
      data:
        name: EV Charger
        message: Smart charging enabled for the night.
  mode: single

- alias: "EV – Disable smart charging in the morning"
  description: >
    At 06:00, turns off smart charging. The ev_toggle_off trigger in
    pyscript sends 0A to the charger, preventing uncontrolled charging.
  triggers:
    - trigger: time
      at: "06:00:00"
  conditions: []
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_smart_charging_enabled
    - action: logbook.log
      data:
        name: EV Charger
        message: Smart charging ended. Charger paused.
  mode: single

- alias: "EV – Deadline warning at 03:00"
  description: >
    Sends a persistent notification at 03:00 if the car is still charging
    and won't reach its target SOC by 06:00 at the current rate.
  triggers:
    - trigger: time
      at: "03:00:00"
  conditions:
    - condition: template
      value_template: >
        {{ states('sensor.gpn007772_charger_mode') in
           ['connected_charging', 'connected_requesting']
           and states('sensor.volvo_ex30_battery') | float(0)
           < states('input_number.ev_target_soc') | float(90) }}
  actions:
    - action: persistent_notification.create
      data:
        title: "⚡ EV Charging Warning"
        message: >
          Car at {{ states('sensor.volvo_ex30_battery') }}%
          (target {{ states('input_number.ev_target_soc') | int }}%).
          Estimated time remaining:
          {{ states('sensor.volvo_ex30_estimated_charging_time') }} min.
        notification_id: ev_deadline_warning
  mode: single

- alias: "EV – Start charging on arrival if night window"
  description: >
    If car arrives home during the charge window with smart charging
    not yet enabled, turn it on immediately.
  triggers:
    - trigger: state
      entity_id: sensor.gpn007772_charger_mode
      from: disconnected
      to:
        - connected_charging
        - connected_requesting
  conditions:
    - condition: template
      value_template: >
        {% set start = states('input_datetime.ev_charge_start_time') | default('22:00:00') %}
        {% set end = states('input_datetime.ev_charge_deadline') | default('06:00:00') %}
        {% set now_t = now().strftime('%H:%M:%S') %}
        {% if start > end %}
          {{ now_t >= start or now_t < end }}
        {% else %}
          {{ start <= now_t < end }}
        {% endif %}
    - condition: state
      entity_id: input_boolean.ev_smart_charging_enabled
      state: "off"
  actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ev_smart_charging_enabled
    - action: logbook.log
      data:
        name: EV Charger
        message: Car connected during charge window – smart charging activated.
  mode: single
