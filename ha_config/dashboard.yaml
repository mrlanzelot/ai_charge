# EV Smart Charging – Dashboard Section for Energy Overview
# Deploy to: Energy Overview → Home view (add as new section via API or UI)
#
# This section provides full observability into the EV charging controller:
#   - Configuration controls (enable, deadline, SOC target, fuse limit)
#   - Live controller state (status, decision, headroom, schedule)
#   - Charging metrics (setpoint, power, SOC, session energy)

# ── Section: EV Smart Charging ──────────────────────────────────────────────────
# Uses HA's sections view format (grid layout)
type: grid
cards:

  - type: heading
    heading_style: title
    heading: "⚡ EV Smart Charging"
    icon: mdi:ev-station

  # ── Controller Status ─────────────────────────────────────────────────────────
  - type: entities
    title: Controller Status
    show_header_toggle: false
    entities:
      - entity: pyscript.ev_controller_status
        name: Status
        icon: mdi:state-machine
      - entity: input_select.ev_charging_mode
        name: Charging mode
      - entity: input_number.ev_charging_current_setpoint
        name: Setpoint
      - entity: sensor.gpn007772_allocated_charge_current
        name: Allocated (charger)
      - entity: sensor.gpn007772_charge_power
        name: Charging power

  # ── SOC gauge ─────────────────────────────────────────────────────────────────
  - type: gauge
    entity: sensor.volvo_ex30_battery
    name: Battery SOC
    min: 0
    max: 100
    severity:
      green: 80
      yellow: 50
      red: 0
    needle: true
    grid_options:
      columns: 4
      rows: auto

  # ── Headroom & Schedule ────────────────────────────────────────────────────────
  - type: entities
    title: Load & Schedule
    show_header_toggle: false
    entities:
      - entity: pyscript.ev_headroom
        name: Min headroom
        icon: mdi:arrow-expand-vertical
      - entity: pyscript.ev_schedule
        name: Price schedule
        icon: mdi:cash-clock
      - entity: sensor.nord_pool_se3_current_price
        name: Current price
      - entity: sensor.volvo_ex30_estimated_charging_time
        name: Est. time remaining

  # ── Configuration ──────────────────────────────────────────────────────────────
  - type: entities
    title: Configuration
    show_header_toggle: false
    entities:
      - entity: input_boolean.ev_smart_charging_enabled
        name: Smart charging
      - entity: input_datetime.ev_charge_deadline
        name: Charge deadline
      - entity: input_number.ev_target_soc
        name: Target SOC
      - entity: input_number.ev_max_house_current
        name: Fuse safety limit

  # ── Charger details (collapsed by default if using sections view) ─────────────
  - type: entities
    title: Charger Details
    show_header_toggle: false
    entities:
      - entity: sensor.gpn007772_charger_mode
        name: Charger mode
      - entity: sensor.gpn007772_session_total_charge
        name: Session energy
      - entity: sensor.volvo_ex30_charging_connection_status
        name: Connection status
      - entity: sensor.volvo_ex30_charging_status
        name: Charging status
      - entity: sensor.volvo_ex30_charging_power
        name: Car charging power
